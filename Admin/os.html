<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Baratieri Luthieria — Ordem de Serviço</title>

  <meta name="description" content="Controle de Ordens de Serviço — Baratieri Luthieria" />

  <!-- CSS base do admin -->
  <link rel="stylesheet" href="admin.css" />
</head>

<body>

<header class="admin-header">
  <h1>🔧 Ordem de Serviço</h1>
  <div class="os-meta">
    <span class="os-id">OS-0001</span>
    <span class="os-status status-recebido">Recebido</span>
  </div>
</header>

<main class="admin-container">

  <!-- =========================
       DADOS DO CLIENTE
       ========================= -->
  <section class="card">
    <h2>Cliente</h2>

    <div class="form-grid">
      <label>
        Nome
        <input type="text" id="cliente-nome" />
      </label>

      <label>
        Telefone
        <input type="tel" id="cliente-telefone" />
      </label>

      <label>
        E-mail
        <input type="email" id="cliente-email" />
      </label>
    </div>
  </section>

  <!-- =========================
       DADOS DO INSTRUMENTO
       ========================= -->
  <section class="card">
    <h2>Instrumento</h2>

    <div class="form-grid">
      <label>
        Tipo
        <input type="text" id="inst-tipo" placeholder="Violão, Viola, Guitarra..." />
      </label>

      <label>
        Marca
        <input type="text" id="inst-marca" />
      </label>

      <label>
        Modelo
        <input type="text" id="inst-modelo" />
      </label>

      <label>
        Nº de Série
        <input type="text" id="inst-serie" />
      </label>
    </div>

    <label class="block">
      Observações do instrumento
      <textarea id="inst-observacoes"></textarea>
    </label>
  </section>

  <!-- =========================
       DIAGNÓSTICO
       ========================= -->
  <section class="card">
    <h2>Diagnóstico</h2>

    <label class="block">
      Relato do cliente
      <textarea id="diag-relato"></textarea>
    </label>

    <label class="block">
      Análise técnica
      <textarea id="diag-analise"></textarea>
    </label>

    <label class="block">
      Riscos / Observações
      <textarea id="diag-riscos"></textarea>
    </label>
  </section>

  <!-- =========================
       SERVIÇOS
       ========================= -->
  <section class="card">
    <h2>Serviços</h2>

    <div class="servicos-add">
      <input type="search" placeholder="Adicionar serviço..." id="buscar-servico" />
      <button type="button" class="btn">+ Adicionar</button>
    </div>

    <table class="servicos-table">
      <thead>
        <tr>
          <th>Descrição</th>
          <th>Valor (R$)</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="lista-servicos">
        <!-- JS insere aqui -->
      </tbody>
    </table>
  </section>

  <!-- =========================
       VALORES
       ========================= -->
  <section class="card valores-card">
    <h2>Valores</h2>

    <div class="form-grid">
      <label>
        Orçado
        <input type="number" step="0.01" id="valor-orcado" />
      </label>

      <label>
        Aprovado
        <input type="number" step="0.01" id="valor-aprovado" />
      </label>

      <label>
        Final
        <input type="number" step="0.01" id="valor-final" />
      </label>

      <label>
        Prazo (dias)
        <input type="number" id="prazo-dias" />
      </label>
    </div>
  </section>

  <!-- =========================
       IMAGENS
       ========================= -->
  <section class="card">
    <h2>Imagens do Serviço</h2>

    <div class="tabs">
      <button class="tab active" data-stage="antes">Antes</button>
      <button class="tab" data-stage="durante">Durante</button>
      <button class="tab" data-stage="depois">Depois</button>
    </div>

    <div class="upload-area">
      <input type="file" multiple accept="image/*" />
      <p class="hint">Arraste ou selecione imagens</p>
    </div>

    <div class="galeria-imagens">
      <!-- thumbnails -->
    </div>
  </section>

  <!-- =========================
       OBSERVAÇÕES FINAIS
       ========================= -->
  <section class="card">
    <h2>Observações Gerais</h2>
    <textarea id="os-observacoes"></textarea>
  </section>

  <!-- =========================
       AÇÕES
       ========================= -->
  <section class="actions">
    <button class="btn secondary">Salvar rascunho</button>
    <button class="btn primary">Salvar OS</button>
  </section>

</main>
<script src="./os.js"></script>
</body>
</html>
